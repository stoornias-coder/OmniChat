name: Build OmniChat APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android
          sed -i 's/<activity/<activity android:enableOnBackInvokedCallback="false"/' android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          sed -i 's/android:windowSoftInputMode="[^"]*"/android:windowSoftInputMode="adjustResize"/' android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          grep -q 'adjustResize' android/app/src/main/AndroidManifest.xml || \
            sed -i 's/android:theme="[^"]*"/& android:windowSoftInputMode="adjustResize"/' android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          sed -i 's/super.onCreate/getWindow().getDecorView().setImportantForAccessibility(android.view.View.IMPORTANT_FOR_ACCESSIBILITY_YES); super.onCreate/' android/app/src/main/java/com/inkmind/app/MainActivity.java 2>/dev/null || true

      - name: Copy splash screens
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp assets/splash/drawable-port-xxhdpi.png android/app/src/main/res/drawable/splash.png
          for density in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/drawable-port-${density}
            cp assets/splash/drawable-port-${density}.png android/app/src/main/res/drawable-port-${density}/splash.png
          done
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml

      - name: Copy app icons
        run: |
          for density in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            cp assets/icons/mipmap-${density}.png android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp assets/icons/mipmap-${density}.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
            cp assets/icons/mipmap-${density}.png android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png
          done
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          cp android/app/build/outputs/apk/debug/app-debug.apk InkMind-${VERSION}.apk

      - name: Attach APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: InkMind-${{ github.event.release.tag_name }}.apk
